<div class="ai-page">

<div class="ai-container">

<h1 class="title">AI Fitness Trainer</h1>

<p class="subtitle">
Generate a smart workout and diet plan based on your body details.
</p>


<!-- FORM -->

<div class="form-card">

<h2>Enter Your Fitness Details</h2>

<div class="form-grid">

<div class="form-group">
<label>Height (cm)</label>
<input
type="number"
placeholder="Enter height"
[(ngModel)]="height">
</div>


<div class="form-group">
<label>Weight (kg)</label>
<input
type="number"
placeholder="Enter weight"
[(ngModel)]="weight">
</div>


<div class="form-group">
<label>Fitness Goal</label>

<select [(ngModel)]="goal">

<option value="Muscle Gain">
Muscle Gain
</option>

<option value="Weight Loss">
Weight Loss
</option>

<option value="Stay Fit">
Stay Fit
</option>

</select>

</div>

</div>


<button
class="generate-btn"
(click)="generatePlan()">

Generate Plan

</button>

</div>


<!-- RESULT -->

<div class="result-card" *ngIf="result">

<h2>Your AI Fitness Plan</h2>

<pre>
{{result}}
</pre>

</div>


<!-- TIPS -->

<div class="tips-card">

<h2>AI Fitness Tips</h2>

<p>
Consistency is the key to fitness. Follow your workout routine,
eat balanced meals and track your progress regularly.
</p>

</div>

</div>

</div>

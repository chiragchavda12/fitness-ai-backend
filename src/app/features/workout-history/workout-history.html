<div class="history-page">

<div class="history-container">

<h1>Workout History</h1>
<p>Your completed workouts are shown below.</p>


<!-- EMPTY MESSAGE -->

<div *ngIf="workouts.length === 0" class="empty">
No workout history found.
</div>


<!-- HISTORY GRID -->

<div class="history-grid">

<div
class="history-card"
*ngFor="let w of workouts"
>

<h2>{{w.exercise}}</h2>


<!-- VIDEO -->

<div *ngIf="w.video">

<iframe
width="100%"
height="200"
[src]="getSafeUrl(w.video)"
frameborder="0"
allowfullscreen>
</iframe>

</div>


<div class="details">

<p><b>Sets:</b> {{w.sets}}</p>

<p><b>Reps:</b> {{w.reps}}</p>

<p><b>Date:</b> {{w.date | date}}</p>

</div>


<button
class="delete-btn"
(click)="deleteWorkout(w._id)"
>

Delete

</button>


</div>

</div>

</div>

</div>
